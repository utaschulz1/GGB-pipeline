name: Publish Open Textbook

on:
  push:
    branches:
      - main # Set a branch name to trigger deployment
    paths-ignore:
      - "README.md"

jobs:
  publish_textbook:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public/